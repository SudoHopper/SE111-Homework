<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Your Name Here">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <!--Build your Table and Form here-->
    <h1><b>Birthday Party Registration Form</b></h1>
    <form action="confirm.html" method="get">
        <table>
            <thead>
                <tr>
                    <td><b>Labels</b></td>
                    <td><b>Form Fields</b></td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Parents/Guardian Name</td>
                    <td><input type="text" required maxlength="20" name="gfirst" id="g-first" placeholder="First Name">
                        <br><input type="text" required maxlength="20" name="glast" id="g-last" placeholder="Last Name">
                    </td>
                </tr>
                <tr>
                    <td>Child's First Name</td>
                    <td><input type="text" required name="cfirst" id="c-first" placeholder="Child's First Name"></td>
                </tr>
                <tr>
                    <td>Child's Age</td>
                    <td><input type="number" required name="age" id="age" value="3"></td>
                </tr>
                <tr>
                    <td><h2>Date and Time</h2></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Date</td>
                    <td><input type="date" required name="date" id="date"></td>
                </tr>
                <tr>
                    <td>Start Time</td>
                    <td><input type="time" required name="time" id="s-time"></td>
                </tr>
                <tr>
                    <td>Number of Guest</td>
                    <td><input type="number" name="guest" value="5"></td>
                </tr>
                <tr>
                    <td><h2>Food</h2></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Size</td>
                    <td><input type="radio" name="size" id="sm">sm <input type="radio" name="size" id="md">md <input type="radio" name="size" id="lg">lg</td>
                </tr>
                <tr>
                    <td>Drinks</td>
                    <td><input type="checkbox" name="drink1" id="drink1" checked value="coke"><label for="drink1">Coke</label><br>
                        <input type="checkbox" name="drink2" id="drink1" checked value="sprite"><label for="drink2">Sprite</label><br>
                        <input type="checkbox" name="drink3" id="drink1" checked value="fruit punch"><label for="drink3">Fruit Punch</label><br>
                        <input type="checkbox" name="drink4" id="drink1" checked value="lemonade"><label for="drink4">Lemonade</label><br>
                        <input type="checkbox" name="drink5" id="drink1" checked value="iced tea"><label for="drink5">Iced Tea</label>
                    </td>
                </tr>
                <tr>
                    <td>Cake</td>
                    <td><select name="cake" id="cake"><option>Chocolate</option>
                        <option>Vanilla</option>
                        <option>I'll bring my own</option></select>
                    </td>
                </tr>
                <tr>
                    <td><h2>Decorations</h2></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Color Scheme</td>
                    <td><input type="color" name="colors" id="colors"></td>
                </tr>
                <tr>
                    <td>Comments</td>
                    <td><textarea placeholder="Please add any additional comments here" name="commnets" id="commnets"></textarea></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
