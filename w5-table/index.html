<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Your Name Here">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <!--Build your Table and Form here-->
    <h1><b>Birthday Party Registration Form</b></h1>
    <form action="confirm.html" method="get">
        <table>
            <thead>
                <tr>
                    <td><b>Labels</b></td>
                    <td><b>Form Fields</b></td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Parents/Guardians Names</td>
                    <td><input type="text" required maxlength="20" name="gfirst" id="g-first" placeholder="First Name">
                        <br><input type="text" required maxlength="20" name="glast" id="g-last" placeholder="Last Name">
                    </td>
                </tr>
                <tr>
                    <td>Child's First Name</td>
                    <td><input type="text" required name="cfirst" id="c-first" placeholder="Child's First Name"></td>
                </tr>
                <tr>
                    <td>Child's Age</td>
                    <td><input type="text" name="First Name"></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
