        var hw = Number(prompt("Please enter hours worked in a week:"))
        var tr = Number(prompt("Please enter tax rate:"))
        var gp = 0
        var us = 0
        var np = 0

        function calc(x,y)
        {
            hw * 2 = hw
            hp * hw = gp
            gp * tr = us
            gp - us = np
        } 
        
    </script>
